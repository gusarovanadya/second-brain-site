<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оплата не завершена</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#120b0b;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{max-width:640px;padding:40px;border-radius:24px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);box-shadow:0 10px 40px rgba(0,0,0,.35)}
    h1{margin:0 0 16px;font-size:36px}
    p{margin:0 0 12px;line-height:1.6;color:#e0d7d7}
    a{color:#ffb3b3;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <h1>Оплата не завершена</h1>
    <p>Похоже, платёж не прошёл или был отменён.</p>
    <p>Попробуйте снова или вернитесь на сайт.</p>
    <p><a href="/">Вернуться на главную</a></p>
  </div>
</body>
</html>
